<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>NEON RUNNER - A Cyberpunk Endless Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .menu-screen, .gameover-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            text-align: center;
            color: #fff;
        }

        .menu-screen {
            opacity: 1;
        }

        .menu-screen.hidden {
            display: none;
        }

        .gameover-screen {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.15);
            max-width: 500px;
        }

        .gameover-screen.show {
            display: block;
        }

        h1 {
            font-size: 80px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .button {
            display: inline-block;
            padding: 15px 40px;
            margin: 15px;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        .button:active {
            transform: scale(0.98);
        }

        .button.secondary {
            background: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .button.secondary:hover {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }

        .button.ghost {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            box-shadow: none;
        }

        .button.ghost:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .controls-info {
            margin-top: 60px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        .controls-info p {
            margin: 10px 0;
        }

        .mobile-hint {
            color: #00ffff;
            font-weight: bold;
            margin-top: 20px;
            opacity: 0.6;
        }

        .score-display {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .score-label {
            color: #00ffff;
        }

        .coins-label {
            color: #ffff00;
        }

        h2 {
            font-size: 50px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffff;
        }

        .stat-box.coins .stat-value {
            color: #ffff00;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: #fff;
            font-size: 18px;
            text-align: center;
            text-transform: uppercase;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-container">
        <div class="score-display" id="scoreDisplay" style="display: none;">
            <div><span class="score-label">SCORE:</span> <span id="scoreValue">0</span></div>
            <div><span class="coins-label">COINS:</span> <span id="coinsValue">0</span></div>
        </div>

        <div class="menu-screen" id="menuScreen">
            <h1>NEON RUNNER</h1>
            <p class="subtitle">A Cyberpunk Protocol</p>
            <button class="button" onclick="startGame()">INITIATE RUN</button>
            <div class="controls-info">
                <p>[W / UP ARROW] JUMP</p>
                <p>[S / DOWN ARROW] SLIDE</p>
                <p>[A/D / ARROWS] STEER</p>
                <p class="mobile-hint">MOBILE: SWIPE TO CONTROL</p>
            </div>
        </div>

        <div class="gameover-screen" id="gameoverScreen">
            <h2>CONNECTION LOST</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Final Score</div>
                    <div class="stat-value" id="finalScore">0</div>
                </div>
                <div class="stat-box coins">
                    <div class="stat-label">Data Coins</div>
                    <div class="stat-value" id="finalCoins">0</div>
                </div>
            </div>
            <input type="text" id="playerName" placeholder="ENTER OPERATIVE ID" maxlength="15">
            <button class="button" onclick="submitScore()">UPLOAD RECORD</button>
            <button class="button ghost" onclick="backToMenu()">RETURN TO HUB</button>
        </div>
    </div>

    <script>
        // Game Constants
        const FOV = 400;
        const CAMERA_Y = 250;
        const CAMERA_Z = -200;
        const LANE_WIDTH = 250;
        const GRAVITY = 1.4;
        const JUMP_VELOCITY = 22;

        // Game State
        let gameState = 'menu'; // menu, playing, gameover
        let gameCore = {
            score: 0,
            coins: 0,
            speed: 25,
            distance: 0,
            player: {
                lane: 0,
                visualLane: 0,
                y: 0,
                vy: 0,
                slideTimer: 0
            },
            objects: [],
            spawnTimer: 0,
            nextObjId: 0
        };

        let finalScore = 0;
        let finalCoins = 0;
        let keys = {};

        // Setup Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Input Handling
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (gameState !== 'playing') return;

            const p = gameCore.player;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                p.lane = Math.max(-1, p.lane - 1);
            } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                p.lane = Math.min(1, p.lane + 1);
            } else if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
                if (p.y === 0) p.vy = JUMP_VELOCITY;
            } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                if (p.y === 0) p.slideTimer = 40;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Touch Controls
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', (e) => {
            if (gameState !== 'playing') return;
            if (e.cancelable) e.preventDefault();
            
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing') return;
            if (e.cancelable) e.preventDefault();
            
            const touch = e.touches[0];
            const diffX = touch.clientX - touchStartX;
            const diffY = touch.clientY - touchStartY;
            const threshold = 30;

            if (Math.abs(diffX) > threshold || Math.abs(diffY) > threshold) {
                const p = gameCore.player;
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > threshold) p.lane = Math.min(1, p.lane + 1);
                    else if (diffX < -threshold) p.lane = Math.max(-1, p.lane - 1);
                } else {
                    if (diffY < -threshold && p.y === 0) p.vy = JUMP_VELOCITY;
                    else if (diffY > threshold && p.y === 0) p.slideTimer = 40;
                }
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }
        }, { passive: false });

        // Game Functions
        function startGame() {
            gameState = 'playing';
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('scoreDisplay').style.display = 'flex';
            
            gameCore = {
                score: 0,
                coins: 0,
                speed: 25,
                distance: 0,
                player: {
                    lane: 0,
                    visualLane: 0,
                    y: 0,
                    vy: 0,
                    slideTimer: 0
                },
                objects: [],
                spawnTimer: 0,
                nextObjId: 0
            };
        }

        function endGame(score, coins) {
            gameState = 'gameover';
            finalScore = Math.floor(score);
            finalCoins = coins;
            document.getElementById('scoreDisplay').style.display = 'none';
            document.getElementById('finalScore').textContent = finalScore;
            document.getElementById('finalCoins').textContent = finalCoins;
            document.getElementById('gameoverScreen').classList.add('show');
            document.getElementById('playerName').value = '';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert('Please enter your operative ID');
                return;
            }
            // Save to localStorage
            let scores = JSON.parse(localStorage.getItem('neonRunnerScores') || '[]');
            scores.push({
                name: name,
                score: finalScore,
                coins: finalCoins,
                date: new Date().toLocaleDateString()
            });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem('neonRunnerScores', JSON.stringify(scores.slice(0, 50)));
            
            alert(`Score uploaded! ${name}: ${finalScore}`);
            backToMenu();
        }

        function backToMenu() {
            gameState = 'menu';
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('gameoverScreen').classList.remove('show');
            document.getElementById('scoreDisplay').style.display = 'none';
        }

        // Main Game Loop
        let lastTime = performance.now();

        function render(time) {
            const deltaTime = time - lastTime;
            if (deltaTime > 100) {
                lastTime = time;
                requestAnimationFrame(render);
                return;
            }
            lastTime = time;

            const width = canvas.width;
            const height = canvas.height;
            const horizonY = height * 0.45;

            // Helper function to project 3D to 2D
            const project = (worldX, worldY, worldZ) => {
                const z = worldZ - CAMERA_Z;
                const scale = z > 0 ? FOV / z : 0;
                const x = (width / 2) + (worldX * scale);
                const y = horizonY - ((worldY - CAMERA_Y) * scale);
                return { x, y, scale };
            };

            // Update game logic
            if (gameState === 'playing') {
                const p = gameCore.player;
                p.visualLane += (p.lane - p.visualLane) * 0.15;
                
                p.y += p.vy;
                p.vy -= GRAVITY;
                if (p.y < 0) {
                    p.y = 0;
                    p.vy = 0;
                }

                if (p.slideTimer > 0) p.slideTimer--;

                gameCore.speed += 0.005;
                gameCore.distance += gameCore.speed;
                gameCore.score += gameCore.speed * 0.1;

                // Spawn objects
                gameCore.spawnTimer--;
                if (gameCore.spawnTimer <= 0) {
                    const lane = Math.floor(Math.random() * 3) - 1;
                    const r = Math.random();
                    let type = 'coin';
                    if (r < 0.4) type = 'coin';
                    else if (r < 0.7) type = 'short';
                    else type = 'tall';

                    gameCore.objects.push({
                        id: gameCore.nextObjId++,
                        type: type,
                        lane: lane,
                        z: 4000,
                        active: true
                    });

                    if (type === 'coin' && Math.random() > 0.5) {
                        gameCore.objects.push({
                            id: gameCore.nextObjId++,
                            type: 'coin',
                            lane: lane,
                            z: 4150,
                            active: true
                        });
                        gameCore.objects.push({
                            id: gameCore.nextObjId++,
                            type: 'coin',
                            lane: lane,
                            z: 4300,
                            active: true
                        });
                    }

                    gameCore.spawnTimer = 60 / (gameCore.speed / 20);
                }

                // Update and collision check objects
                for (let i = gameCore.objects.length - 1; i >= 0; i--) {
                    const obj = gameCore.objects[i];
                    obj.z -= gameCore.speed;

                    if (obj.z < -200) {
                        gameCore.objects.splice(i, 1);
                        continue;
                    }

                    if (obj.active && obj.z < 80 && obj.z > -20) {
                        if (Math.abs(p.visualLane - obj.lane) < 0.5) {
                            if (obj.type === 'coin') {
                                if (p.y < 100) {
                                    obj.active = false;
                                    gameCore.coins++;
                                    gameCore.score += 50;
                                }
                            } else if (obj.type === 'short') {
                                if (p.y < 60) {
                                    endGame(gameCore.score, gameCore.coins);
                                }
                            } else if (obj.type === 'tall') {
                                const playerHeight = p.slideTimer > 0 ? 40 : 80;
                                if (p.y + playerHeight > 70) {
                                    endGame(gameCore.score, gameCore.coins);
                                }
                            }
                        }
                    }
                }

                document.getElementById('scoreValue').textContent = Math.floor(gameCore.score);
                document.getElementById('coinsValue').textContent = gameCore.coins;
            } else if (gameState === 'menu') {
                gameCore.distance += 10;
            }

            // Rendering
            const skyGradient = ctx.createLinearGradient(0, 0, 0, horizonY);
            skyGradient.addColorStop(0, '#02000a');
            skyGradient.addColorStop(1, '#1a0b2e');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, horizonY);

            // Sun glow
            ctx.save();
            ctx.shadowBlur = 50;
            ctx.shadowColor = '#0ff';
            ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(width / 2, horizonY, 80, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Ground
            ctx.fillStyle = '#050210';
            ctx.fillRect(0, horizonY, width, height - horizonY);

            // Grid lines
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.6)';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#0ff';

            for (let i = -1.5; i <= 1.5; i += 1) {
                const bottom = project(i * LANE_WIDTH, 0, 0);
                const top = project(i * LANE_WIDTH, 0, 4000);
                ctx.beginPath();
                ctx.moveTo(bottom.x, bottom.y);
                ctx.lineTo(top.x, top.y);
                ctx.stroke();
            }

            // Horizontal grid lines
            const lineSpacing = 300;
            const offset = gameCore.distance % lineSpacing;
            for (let z = 4000; z > 0; z -= lineSpacing) {
                const realZ = z - offset;
                const left = project(-LANE_WIDTH * 1.5, 0, realZ);
                const right = project(LANE_WIDTH * 1.5, 0, realZ);
                
                const alpha = Math.max(0, Math.min(1, (3000 - realZ) / 2000));
                ctx.strokeStyle = `rgba(255, 0, 255, ${alpha * 0.6})`;
                ctx.shadowColor = '#f0f';
                
                ctx.beginPath();
                ctx.moveTo(left.x, left.y);
                ctx.lineTo(right.x, right.y);
                ctx.stroke();
            }

            // Render objects
            const renderList = [...gameCore.objects].sort((a, b) => b.z - a.z);

            renderList.forEach(obj => {
                if (!obj.active || obj.z < CAMERA_Z) return;

                ctx.save();
                if (obj.type === 'coin') {
                    const p = project(obj.lane * LANE_WIDTH, 40, obj.z);
                    const r = 25 * p.scale;
                    
                    ctx.fillStyle = '#ff0';
                    ctx.shadowBlur = 20 * p.scale;
                    ctx.shadowColor = '#ff0';
                    
                    const stretch = Math.sin(gameCore.distance * 0.05 + obj.z * 0.01) * r;
                    
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, Math.abs(stretch) + 2, r, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.ellipse(p.x, p.y, Math.abs(stretch) * 0.5 + 1, r * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'short') {
                    const bottom = project(obj.lane * LANE_WIDTH, 0, obj.z);
                    const top = project(obj.lane * LANE_WIDTH, 60, obj.z);
                    const w = 140 * bottom.scale;
                    
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.8)';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.shadowBlur = 25 * bottom.scale;
                    ctx.shadowColor = '#f00';
                    
                    ctx.beginPath();
                    ctx.moveTo(bottom.x - w/2, bottom.y);
                    ctx.lineTo(bottom.x + w/2, bottom.y);
                    ctx.lineTo(top.x + w/2, top.y);
                    ctx.lineTo(top.x - w/2, top.y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                } else if (obj.type === 'tall') {
                    const bottom = project(obj.lane * LANE_WIDTH, 70, obj.z);
                    const top = project(obj.lane * LANE_WIDTH, 140, obj.z);
                    const w = 160 * bottom.scale;

                    ctx.fillStyle = 'rgba(170, 0, 255, 0.8)';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 30 * bottom.scale;
                    ctx.shadowColor = '#a0f';
                    
                    ctx.beginPath();
                    ctx.moveTo(bottom.x - w/2, bottom.y);
                    ctx.lineTo(bottom.x + w/2, bottom.y);
                    ctx.lineTo(top.x + w/2, top.y);
                    ctx.lineTo(top.x - w/2, top.y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });

            // Player
            if (gameState !== 'menu') {
                ctx.save();
                const p = gameCore.player;
                const pHeight = p.slideTimer > 0 ? 40 : 80;
                const pColor = gameState === 'gameover' ? '#f00' : '#0f0';
                
                const pBot = project(p.visualLane * LANE_WIDTH, p.y, 0);
                const pTop = project(p.visualLane * LANE_WIDTH, p.y + pHeight, 0);
                const pw = 80 * pBot.scale;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                const shadow = project(p.visualLane * LANE_WIDTH, 0, 0);
                ctx.beginPath();
                ctx.ellipse(shadow.x, shadow.y, pw * 0.8, pw * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = pColor;
                ctx.shadowBlur = 30;
                ctx.shadowColor = pColor;
                ctx.globalCompositeOperation = 'screen';
                
                ctx.beginPath();
                ctx.moveTo(pBot.x - pw/2, pBot.y);
                ctx.lineTo(pBot.x + pw/2, pBot.y);
                ctx.lineTo(pTop.x + pw/2, pTop.y);
                ctx.lineTo(pTop.x - pw/2, pTop.y);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 0;
                ctx.globalCompositeOperation = 'source-over';
                ctx.beginPath();
                ctx.moveTo(pBot.x - pw/4, pBot.y - (pBot.y - pTop.y)*0.2);
                ctx.lineTo(pBot.x + pw/4, pBot.y - (pBot.y - pTop.y)*0.2);
                ctx.lineTo(pTop.x + pw/4, pTop.y + (pBot.y - pTop.y)*0.2);
                ctx.lineTo(pTop.x - pw/4, pTop.y + (pBot.y - pTop.y)*0.2);
                ctx.closePath();
                ctx.fill();

                if (gameState === 'playing') {
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.4)';
                    const trailY = pBot.y + (Math.random() * 20);
                    ctx.beginPath();
                    ctx.moveTo(pBot.x - pw/3, pBot.y);
                    ctx.lineTo(pBot.x + pw/3, pBot.y);
                    ctx.lineTo(pBot.x, trailY);
                    ctx.fill();
                }

                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
